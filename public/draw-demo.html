<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>달팽이 경주 추첨 데모</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111;--bg2:#1a1a1a;--bg3:#222;--txt:#fff;--txt2:#888;--border:#2a2a2a;--border2:#333;--acc2:#00e5a0;--purple:#5845dc;--purple-light:#a89fff}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:40px 32px}
h2{font-size:13px;font-weight:700;color:var(--txt2);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.total-large{font-size:32px;font-weight:900;color:#fff}
.timer{font-family:monospace;font-size:32px;font-weight:700;color:#fff}
.vote-item{display:flex;align-items:center;gap:20px;margin-bottom:14px}
.vote-item-left{width:130px;flex-shrink:0}
.vote-cmd{font-size:13px;font-weight:700;color:#fff;margin-bottom:6px}
.vote-label{font-size:28px;font-weight:900;color:#fff;line-height:1}
.vote-bar-outer{flex:1;position:relative}
.vote-item-bar-wrap{width:100%;height:56px;background:var(--bg3);border-radius:10px;overflow:hidden;cursor:pointer;display:flex;align-items:center;transition:filter .15s}
.vote-item-bar-wrap:hover{filter:brightness(1.1)}
.vote-bar-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#00b4d8,#00e5a0);transition:width .5s ease;border-radius:10px;pointer-events:none}
.vote-bar-text{position:relative;z-index:1;padding:0 110px 0 20px;font-size:22px;font-weight:700;color:#fff;white-space:nowrap}
.vote-draw-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);z-index:3;background:#00e5a0;color:#111;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
.vote-draw-btn:hover{background:#00c880;transform:translateY(-50%) scale(1.03)}
.vote-voters{padding:8px 0 4px 150px;display:none;flex-wrap:wrap;gap:4px}
.vote-voters.open{display:flex}
.voter-chip{display:inline-flex;align-items:center;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:3px 9px;font-size:12px;color:var(--txt2)}
.draw-excluded-wrap{padding:4px 0 10px 150px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.draw-excluded-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.3);border-radius:4px;padding:3px 10px;font-size:12px;color:#ff8080;cursor:pointer}
.bottom-bar{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.hide-label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt2);cursor:pointer;user-select:none}
.hide-label input{accent-color:var(--acc2);width:14px;height:14px;cursor:pointer}
.btn-end{background:#00e5a0;color:#111;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}

/* ── 모달 배경 ── */
#draw-modal{position:fixed;inset:0;background:rgba(4,3,20,.92);z-index:9999;display:none;align-items:center;justify-content:center;overflow-y:auto;padding:20px 0;backdrop-filter:blur(4px)}

/* ── 카드 ── */
.draw-card{background:linear-gradient(145deg,#0a0a16 0%,#0e0e24 50%,#0a0a16 100%);border:1px solid rgba(88,69,220,.4);border-radius:22px;padding:30px 34px;display:flex;flex-direction:column;align-items:center;width:740px;max-width:96vw;box-shadow:0 0 0 1px rgba(88,69,220,.08),0 0 60px rgba(88,69,220,.18),0 40px 80px rgba(0,0,0,.9);position:relative;overflow:hidden}
.draw-card::before{content:'';position:absolute;top:0;left:-50%;width:200%;height:1px;background:linear-gradient(90deg,transparent,rgba(88,69,220,.6),rgba(168,159,255,.4),rgba(88,69,220,.6),transparent);animation:scanLine 3s linear infinite}
@keyframes scanLine{0%{top:-2px}100%{top:calc(100% + 2px)}}
.draw-card-title{font-size:10px;font-weight:800;color:rgba(168,159,255,.55);letter-spacing:5px;text-transform:uppercase;margin-bottom:22px}

/* ── 경주 트랙 ── */
.race-scene{width:100%;background:#050510;border-radius:14px;overflow:hidden;border:1px solid rgba(88,69,220,.22);box-shadow:inset 0 0 40px rgba(0,0,0,.6),0 0 20px rgba(88,69,220,.08);margin-bottom:16px}
.race-lane{position:relative;height:64px;background:linear-gradient(180deg,#06061a 0%,#080820 55%,#06061a 100%);border-bottom:1px solid rgba(88,69,220,.1);overflow:visible}
.race-lane:last-child{border-bottom:none}
.race-lane::before{content:'';position:absolute;top:50%;left:12px;right:20px;height:1px;transform:translateY(-50%);background:repeating-linear-gradient(90deg,transparent,transparent 10px,rgba(255,255,255,.04) 10px,rgba(255,255,255,.04) 20px);animation:dashMove 1.2s linear infinite}
@keyframes dashMove{0%{background-position:0 0}100%{background-position:-20px 0}}
.race-lane::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0,transparent 39px,rgba(88,69,220,.04) 39px,rgba(88,69,220,.04) 40px);pointer-events:none}

/* 결승선 */
.race-finish{position:absolute;right:0;top:0;bottom:0;width:16px;z-index:2;background-image:linear-gradient(45deg,#ffd700 25%,#1a1408 25%,#1a1408 75%,#ffd700 75%),linear-gradient(45deg,#ffd700 25%,#1a1408 25%,#1a1408 75%,#ffd700 75%);background-size:8px 8px;background-position:0 0,4px 4px;background-color:#1a1408;box-shadow:-6px 0 16px rgba(255,215,0,.35),inset -2px 0 6px rgba(255,215,0,.2)}

/* 달팽이 */
.racer{position:absolute;left:2%;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;z-index:4;will-change:left;filter:drop-shadow(0 0 6px rgba(88,69,220,.55))}
.racer-nametag{font-size:9px;font-weight:800;color:#d0c8ff;background:linear-gradient(135deg,rgba(88,69,220,.75),rgba(30,20,90,.85));border:1px solid rgba(120,100,255,.5);border-radius:7px;padding:2px 7px;white-space:nowrap;max-width:74px;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;line-height:1.4;box-shadow:0 0 8px rgba(88,69,220,.25),inset 0 1px 0 rgba(255,255,255,.08)}
.racer-snail{font-size:24px;line-height:1}
.event-pop{display:none;position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);font-size:11px;font-weight:800;color:#fff;background:linear-gradient(135deg,rgba(88,69,220,.95),rgba(140,100,255,.85));border:1px solid rgba(160,130,255,.5);padding:3px 10px;border-radius:8px;white-space:nowrap;z-index:6;box-shadow:0 0 14px rgba(88,69,220,.5);animation:epop .25s cubic-bezier(.175,.885,.32,1.275)}
@keyframes epop{from{opacity:0;transform:translateX(-50%) scale(.5)}to{opacity:1;transform:translateX(-50%) scale(1)}}
.rank-badge{display:none;position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:17px;z-index:5;animation:badgeIn .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes badgeIn{from{transform:translateY(-50%) scale(0) rotate(-20deg)}to{transform:translateY(-50%) scale(1) rotate(0deg)}}

/* 3D 달팽이 */
.snail3d{position:relative;width:42px;height:30px;display:inline-block;flex-shrink:0;animation:waggle .5s ease-in-out infinite}
@keyframes waggle{0%,100%{transform:rotate(0deg) scaleY(1)}50%{transform:rotate(-4deg) scaleY(.95)}}
.s-body{position:absolute;bottom:0;left:0;width:32px;height:13px;background:linear-gradient(180deg,#96e048 0%,#5ec030 55%,#3a9018 100%);border-radius:45% 35% 30% 42%;box-shadow:inset 0 2px 4px rgba(255,255,255,.3),inset 0 -2px 3px rgba(0,0,0,.25),0 2px 6px rgba(0,0,0,.4)}
.s-head{position:absolute;bottom:10px;left:2px;width:14px;height:12px;background:linear-gradient(145deg,#96e048,#5ec030);border-radius:50% 50% 40% 40%;box-shadow:inset 0 2px 3px rgba(255,255,255,.3)}
.s-shell{position:absolute;right:0;bottom:7px;width:26px;height:24px;border-radius:50%;background:conic-gradient(from -15deg at 55% 45%,#f5b040 0deg,#c97a1a 55deg,#e89530 110deg,#b06515 160deg,#d88220 215deg,#a05218 265deg,#c87825 320deg,#f5b040 360deg);box-shadow:inset -4px -4px 8px rgba(0,0,0,.5),inset 3px 3px 6px rgba(255,255,255,.35),2px 3px 10px rgba(0,0,0,.5)}
.s-shell-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;background:radial-gradient(circle at 40% 40%,#c87030,#6a3008);border-radius:50%;box-shadow:0 0 0 2.5px #b07028,0 0 0 5px rgba(140,80,15,.3)}
.s-shine{position:absolute;top:4px;left:4px;width:8px;height:5px;background:rgba(255,255,255,.65);border-radius:50%;transform:rotate(-30deg);filter:blur(1.5px)}
.s-stalkL,.s-stalkR{position:absolute;width:2.5px;background:linear-gradient(180deg,#6ad030,#3a9018);border-radius:2px;bottom:21px}
.s-stalkL{left:5px;height:8px;transform:rotate(-8deg)}
.s-stalkR{left:10px;height:9px;transform:rotate(5deg)}
.s-eye{position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:6px;height:6px;background:radial-gradient(circle at 32% 28%,#fff 22%,#1a1a2e 55%,#000 100%);border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.7)}

/* 순위표 */
.rank-board{width:100%;display:none;margin-bottom:14px}
.rank-board-title{font-size:10px;font-weight:800;color:rgba(168,159,255,.4);letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;text-align:center}
.rank-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.rank-entry{display:flex;align-items:center;gap:8px;background:rgba(88,69,220,.08);border:1px solid rgba(88,69,220,.2);border-radius:8px;padding:7px 14px;animation:rankIn .35s cubic-bezier(.175,.885,.32,1.275)}
@keyframes rankIn{from{opacity:0;transform:scale(.7) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.rank-medal{font-size:15px;flex-shrink:0}
.rank-name{font-size:12px;font-weight:700;color:#d8d0ff}

/* 결과 */
.draw-winner-badge{font-size:11px;font-weight:800;color:#00e5a0;letter-spacing:5px;text-transform:uppercase;height:16px;opacity:0;transition:opacity .6s;margin-bottom:10px;text-shadow:0 0 14px rgba(0,229,160,.6)}
.draw-winner-badge.show{opacity:1}
.draw-winner-name{font-size:24px;font-weight:900;background:linear-gradient(135deg,#fff 0%,#c0b8ff 50%,var(--purple-light) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;min-height:32px;text-align:center}
.draw-pool-info{font-size:12px;color:rgba(168,159,255,.35);margin-top:10px}
.draw-modal-btns{display:flex;gap:10px;margin-top:26px;flex-wrap:wrap;justify-content:center}
.btn{background:rgba(88,69,220,.12);color:#c8c0ff;border:1px solid rgba(88,69,220,.35);border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s,box-shadow .15s}
.btn:hover{background:rgba(88,69,220,.28);box-shadow:0 0 14px rgba(88,69,220,.3)}
.btn-danger{background:rgba(220,50,50,.1);color:#ff8080;border-color:rgba(220,50,50,.3)}
.btn-danger:hover{background:rgba(220,50,50,.22);box-shadow:0 0 14px rgba(220,50,50,.3)}
</style>
</head>
<body>
<h2>🐌 달팽이 경주 추첨 데모</h2>
<div class="top-bar">
  <div class="total-large">총 <span id="total-count">15</span>표</div>
  <div class="timer" id="timer">00:03:01</div>
</div>
<div id="vote-list"></div>
<div class="bottom-bar">
  <label class="hide-label"><input type="checkbox" id="hide-cb" onchange="render()"> 투표 내용 가리기</label>
  <button class="btn-end">투표 종료</button>
</div>

<div id="draw-modal" onclick="if(event.target===this)closeModal()">
  <div class="draw-card">
    <div class="draw-card-title" id="modal-title">🐌 달팽이 경주 추첨</div>
    <div id="race-container" style="width:100%"></div>
    <div class="rank-board" id="rank-board">
      <div class="rank-board-title">최종 순위</div>
      <div class="rank-grid" id="rank-grid"></div>
    </div>
    <div class="draw-winner-badge" id="winner-badge">🏆 우승!</div>
    <div class="draw-winner-name" id="winner-name"></div>
    <div class="draw-pool-info" id="pool-info"></div>
    <div class="draw-modal-btns" id="modal-btns" style="display:none">
      <button class="btn" onclick="redraw()">↺ 다시 뽑기</button>
      <button class="btn btn-danger" onclick="excludeAndClose()">⊘ 뽑힌사람 제외</button>
      <button class="btn" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<script>
const ITEMS=[
  {label:'첫참',votes:['시청자A','시청자B','다비도팬1','구독자짱','하루카']},
  {label:'선참권',votes:['열혈시청자','첫참챔피언','선착순왕','내전고수','다비도팬2','비비주민','병아리','해스크','싹뚝잉','전설의힐러']},
];
const drawnPeople={0:new Set(),1:new Set()};
let openIdx=null,currentVoteIdx=null,lastWinner=null,animId=0;
const MAX_RACERS=8,TRACK_FINISH=83;
const RACE_EVENTS=[
  {id:'turbo',   label:'🚀 터보 장착!',   emoji:'🐌💨',mult:4.2,dur:700},
  {id:'legs',    label:'🦵 두발 달리기!', emoji:'🏃💨',mult:3.0,dur:800},
  {id:'alien',   label:'👽 외계인 납치!',  emoji:'🛸',  mult:0,  dur:700,warp:20},
  {id:'lightning',label:'⚡ 번개 직격!',  emoji:'⚡🐌',mult:6.0,dur:280},
  {id:'sleep',   label:'💤 갑자기 졸음...', emoji:'😴',  mult:0,  dur:700},
  {id:'wind',    label:'🌪️ 돌풍 직격!',   emoji:'🌪️🐌',mult:3.5,dur:500},
  {id:'mushroom',label:'🍄 버섯 파워!',   emoji:'🐌🍄',mult:3.8,dur:550},
  {id:'rocket',  label:'🚀 로켓 발사!',   emoji:'🚀💨',mult:8.0,dur:300},
  {id:'magnet',  label:'🧲 자석!',         emoji:'🧲🐌',mult:2.5,dur:600},
  {id:'banana',  label:'🍌 바나나 밟음!',  emoji:'😵',  mult:0,  dur:500},
];
const MEDALS=['🥇','🥈','🥉'];
const STOP_IDS=['alien','sleep','banana'];
const SNAIL_HTML=`<div class="snail3d"><div class="s-shell"><div class="s-shell-center"></div><div class="s-shine"></div></div><div class="s-body"></div><div class="s-head"></div><div class="s-stalkL"><div class="s-eye"></div></div><div class="s-stalkR"><div class="s-eye"></div></div></div>`;

function render(){
  const hidden=document.getElementById('hide-cb').checked;
  const total=ITEMS.reduce((s,it)=>s+it.votes.length,0);
  document.getElementById('total-count').textContent=total;
  document.getElementById('vote-list').innerHTML=ITEMS.map((it,i)=>{
    const pct=total>0?Math.round(it.votes.length/total*100):0;
    const isOpen=openIdx===i;
    const label=hidden?'<span style="filter:blur(5px);user-select:none;color:#fff">● ● ●</span>':it.label;
    const excl=[...drawnPeople[i]];
    const voters=it.votes.map(n=>`<span class="voter-chip">${n}</span>`).join('');
    return `<div>
      <div class="vote-item">
        <div class="vote-item-left"><div class="vote-cmd">!투표${i+1}</div><div class="vote-label">${label}</div></div>
        <div class="vote-bar-outer">
          <div class="vote-item-bar-wrap" onclick="toggleOpen(${i})">
            <div class="vote-bar-fill" style="width:${pct}%"></div>
            <span class="vote-bar-text">${it.votes.length}표&nbsp;&nbsp;${pct}%</span>
          </div>
          <button class="vote-draw-btn" onclick="openDraw(event,${i})">추첨</button>
        </div>
      </div>
      <div class="vote-voters ${isOpen?'open':''}">${voters}</div>
      ${excl.length?`<div class="draw-excluded-wrap"><span style="font-size:11px;color:#666;margin-right:4px">제외됨:</span>${excl.map(n=>`<span class="draw-excluded-chip" onclick="unexclude(${i},'${n}')">⊘ ${n}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}
function toggleOpen(i){openIdx=openIdx===i?null:i;render();}
function buildPool(i){return ITEMS[i].votes.filter(n=>!drawnPeople[i].has(n));}

function openDraw(e,i){
  e.stopPropagation();
  const pool=buildPool(i);
  if(!pool.length){alert('추첨 가능한 참가자가 없습니다');return;}
  currentVoteIdx=i;lastWinner=null;
  document.getElementById('modal-title').textContent=`🐌 ${ITEMS[i].label} 달팽이 경주`;
  document.getElementById('winner-badge').className='draw-winner-badge';
  document.getElementById('winner-name').textContent='';
  document.getElementById('pool-info').textContent='';
  document.getElementById('modal-btns').style.display='none';
  document.getElementById('rank-board').style.display='none';
  document.getElementById('rank-grid').innerHTML='';
  document.getElementById('draw-modal').style.display='flex';
  startRace(pool);
}

function startRace(pool){
  const myId=++animId;
  const winner=pool[Math.floor(Math.random()*pool.length)];
  const others=pool.filter(n=>n!==winner).sort(()=>Math.random()-.5).slice(0,MAX_RACERS-1);
  const racers=[winner,...others].sort(()=>Math.random()-.5);
  const winnerTarget=3000+Math.random()*3000;
  const state=racers.map(name=>{
    const isWinner=name===winner;
    const targetFinishTime=isWinner?winnerTarget:winnerTarget+1200+Math.random()*(12000-winnerTarget);
    const baseSpd=TRACK_FINISH/(targetFinishTime/1000);
    return{name,isWinner,pos:0,baseSpd,targetFinishTime,
      eventAt:700+Math.random()*3000,
      event:RACE_EVENTS[Math.floor(Math.random()*RACE_EVENTS.length)],
      eventStarted:false,eventActive:false,eventEndAt:0,
      finished:false,warpDone:false,rank:null};
  });
  const rankings=[];
  const container=document.getElementById('race-container');
  const scene=document.createElement('div');scene.className='race-scene';
  state.forEach((s,i)=>{
    const lane=document.createElement('div');lane.className='race-lane';
    lane.innerHTML=`
      <div class="race-finish"></div>
      <div class="racer" id="rc${i}">
        <div class="racer-nametag">${s.name.slice(0,10)}</div>
        <div class="racer-snail" id="re${i}">${SNAIL_HTML}</div>
        <div class="event-pop" id="ev${i}"></div>
      </div>
      <div class="rank-badge" id="rb${i}"></div>`;
    scene.appendChild(lane);
  });
  container.innerHTML='';container.appendChild(scene);

  function addRankEntry(rank,name){
    const grid=document.getElementById('rank-grid');
    const board=document.getElementById('rank-board');
    if(!grid||!board)return;
    board.style.display='block';
    const el=document.createElement('div');el.className='rank-entry';
    el.innerHTML=`<span class="rank-medal">${MEDALS[rank-1]||rank+'위'}</span><span class="rank-name">🐌 ${name}</span>`;
    grid.appendChild(el);
  }

  let raceEnded=false;
  function endRace(){
    if(raceEnded)return;raceEnded=true;lastWinner=winner;
    setTimeout(()=>{
      if(animId!==myId)return;
      document.getElementById('winner-badge').className='draw-winner-badge show';
      document.getElementById('winner-name').textContent=`🏆 ${winner}`;
      document.getElementById('pool-info').textContent=`전체 ${pool.length}명 중 추첨`;
      document.getElementById('modal-btns').style.display='flex';
    },700);
  }

  let startT=null,lastT=null;const MAX_RACE=15000;
  function frame(now){
    if(animId!==myId)return;
    if(!startT){startT=now;lastT=now;}
    const elapsed=now-startT,dt=Math.min((now-lastT)/1000,0.05);lastT=now;
    state.forEach((s,i)=>{
      if(s.finished)return;
      const rcEl=document.getElementById(`rc${i}`);
      const reEl=document.getElementById(`re${i}`);
      const evEl=document.getElementById(`ev${i}`);
      const rbEl=document.getElementById(`rb${i}`);
      if(!rcEl)return;

      if(!s.eventStarted&&elapsed>=s.eventAt){
        s.eventStarted=true;s.eventActive=true;s.eventEndAt=elapsed+s.event.dur;
        if(reEl)reEl.innerHTML=`<span style="font-size:22px;line-height:1">${s.event.emoji}</span>`;
        if(evEl){evEl.textContent=s.event.label;evEl.style.display='block';}
        // 이벤트 글로우 색 변경
        const stopGlow='drop-shadow(0 0 8px rgba(255,60,60,.7))';
        const boostGlow='drop-shadow(0 0 10px rgba(0,229,160,.8))';
        rcEl.style.filter=STOP_IDS.includes(s.event.id)?stopGlow:boostGlow;
        if(s.event.id==='alien'&&!s.warpDone){
          s.warpDone=true;rcEl.style.transition='top 0.3s';rcEl.style.top='-30px';
          setTimeout(()=>{
            if(animId!==myId)return;
            s.pos=Math.min(TRACK_FINISH-2,s.pos+(s.event.warp||15));
            rcEl.style.top='50%';rcEl.style.transition='';
          },s.event.dur*0.5);
        }
      }
      if(s.eventActive&&elapsed>=s.eventEndAt){
        s.eventActive=false;
        if(reEl)reEl.innerHTML=SNAIL_HTML;
        if(evEl)evEl.style.display='none';
        rcEl.style.filter='drop-shadow(0 0 6px rgba(88,69,220,.55))';
      }

      const tl=Math.max(0.03,(s.targetFinishTime-elapsed)/1000);
      const dl=TRACK_FINISH-s.pos;
      let spd=dl>0?dl/tl:0;
      if(s.eventActive){
        if(STOP_IDS.includes(s.event.id))spd=0;
        else spd=s.baseSpd*s.event.mult;
      }
      if(elapsed>MAX_RACE*0.8&&dl>0)spd=Math.max(spd,dl/Math.max(0.03,(MAX_RACE-elapsed)/1000)*1.5);
      s.pos=Math.min(TRACK_FINISH,s.pos+spd*dt);
      rcEl.style.left=s.pos+'%';

      if(s.pos>=TRACK_FINISH&&!s.finished){
        s.finished=true;s.rank=rankings.length+1;rankings.push(s.name);
        if(reEl)reEl.innerHTML=s.isWinner?'<span style="font-size:22px">🎉</span>':SNAIL_HTML;
        if(evEl)evEl.style.display='none';
        // 결승 글로우
        const finishColors=['rgba(255,215,0,.9)','rgba(192,192,192,.8)','rgba(205,127,50,.8)'];
        rcEl.style.filter=`drop-shadow(0 0 14px ${finishColors[s.rank-1]||'rgba(88,69,220,.5)'})`;
        const medal=MEDALS[s.rank-1]||(s.rank+'위');
        if(rbEl){
          rbEl.textContent=medal;rbEl.style.display='block';
          const gc=['#ffd700','#c0c0c0','#cd7f32'];
          rbEl.style.textShadow=`0 0 12px ${gc[s.rank-1]||'#aaa'}`;
        }
        addRankEntry(s.rank,s.name);
        if(s.isWinner)endRace();
      }
    });
    const allDone=state.every(s=>s.finished);
    if(allDone||elapsed>=MAX_RACE){
      state.filter(s=>!s.finished).forEach(s=>{
        const i=state.indexOf(s);
        s.finished=true;s.rank=rankings.length+1;rankings.push(s.name);
        const rbEl=document.getElementById(`rb${i}`);
        if(rbEl){rbEl.textContent=s.rank+'위';rbEl.style.display='block';}
        addRankEntry(s.rank,s.name);
      });
      endRace();
    }else{requestAnimationFrame(frame);}
  }
  requestAnimationFrame(frame);
}

function redraw(){
  const pool=buildPool(currentVoteIdx);
  if(!pool.length){alert('추첨 가능한 참가자가 없습니다');closeModal();return;}
  lastWinner=null;
  document.getElementById('winner-badge').className='draw-winner-badge';
  document.getElementById('winner-name').textContent='';
  document.getElementById('pool-info').textContent='';
  document.getElementById('modal-btns').style.display='none';
  document.getElementById('rank-board').style.display='none';
  document.getElementById('rank-grid').innerHTML='';
  startRace(pool);
}
function excludeAndClose(){if(lastWinner)drawnPeople[currentVoteIdx].add(lastWinner);closeModal();render();}
function closeModal(){animId++;document.getElementById('draw-modal').style.display='none';}
function unexclude(i,n){drawnPeople[i].delete(n);render();}
let sec=181;
setInterval(()=>{sec++;const h=String(Math.floor(sec/3600)).padStart(2,'0'),m=String(Math.floor((sec%3600)/60)).padStart(2,'0'),s=String(sec%60).padStart(2,'0');document.getElementById('timer').textContent=`${h}:${m}:${s}`;},1000);
render();
</script>
