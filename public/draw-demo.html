<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>추첨 데모</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111;--bg2:#1a1a1a;--bg3:#222;--txt:#fff;--txt2:#888;--border:#2a2a2a;--border2:#333;--acc2:#00e5a0;--purple:#5845dc;--purple-l:#a89fff}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:40px 32px}
h2{font-size:13px;font-weight:700;color:var(--txt2);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.total-large{font-size:32px;font-weight:900;color:#fff}
.timer{font-family:monospace;font-size:32px;font-weight:700;color:#fff}
.vote-item{display:flex;align-items:center;gap:24px;margin-bottom:18px}
.vote-item-left{width:160px;flex-shrink:0}
.vote-cmd{font-size:15px;font-weight:700;color:#fff;margin-bottom:8px}
.vote-label{font-size:36px;font-weight:900;color:#fff;line-height:1}
.vote-bar-outer{flex:1;position:relative}
.vote-item-bar-wrap{width:100%;height:70px;background:var(--bg3);border-radius:12px;overflow:hidden;cursor:pointer;display:flex;align-items:center;transition:filter .15s}
.vote-item-bar-wrap:hover{filter:brightness(1.1)}
.vote-bar-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#00b4d8,#00e5a0);transition:width .5s ease;border-radius:12px;pointer-events:none}
.vote-bar-text{position:relative;z-index:1;padding:0 130px 0 24px;font-size:26px;font-weight:700;color:#fff;white-space:nowrap}
.vote-draw-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);z-index:3;background:#00e5a0;color:#111;border:none;border-radius:10px;padding:12px 24px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
.vote-draw-btn:hover{background:#00c880;transform:translateY(-50%) scale(1.03)}
.vote-voters{padding:8px 0 4px 184px;display:none;flex-wrap:wrap;gap:4px}
.vote-voters.open{display:flex}
.voter-chip{display:inline-flex;align-items:center;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 14px;font-size:15px;color:var(--txt2);font-weight:600;cursor:pointer}
.voter-chip:hover{border-color:var(--acc2);color:var(--txt)}
.draw-excluded-wrap{padding:4px 0 10px 184px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.draw-excluded-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.3);border-radius:4px;padding:3px 10px;font-size:12px;color:#ff8080;cursor:pointer}
.bottom-bar{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.hide-label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt2);cursor:pointer;user-select:none}
.hide-label input{accent-color:var(--acc2);width:14px;height:14px;cursor:pointer}
.btn-end{background:#00e5a0;color:#111;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}

/* ── 추첨 레이어 ── */
#draw-overlay{position:fixed;inset:0;background:rgba(4,3,20,.78);z-index:9999;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.draw-slot-box{background:linear-gradient(145deg,#0a0a16,#0e0e24);border:1px solid rgba(88,69,220,.45);border-radius:22px;width:min(640px,96vw);overflow:hidden;box-shadow:0 0 60px rgba(88,69,220,.2),0 32px 80px rgba(0,0,0,.9);animation:boxIn .35s cubic-bezier(.175,.885,.32,1.275)}
@keyframes boxIn{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.draw-slot-title{text-align:center;font-size:10px;font-weight:800;color:rgba(168,159,255,.5);letter-spacing:5px;text-transform:uppercase;padding:26px 0 20px}

/* 릴 창 */
.draw-reel-window{position:relative;height:74px;overflow:hidden}
.draw-reel-center{position:absolute;top:0;bottom:0;left:50%;width:160px;transform:translateX(-50%);border-left:1px solid rgba(88,69,220,.5);border-right:1px solid rgba(88,69,220,.5);background:rgba(88,69,220,.1);z-index:2;pointer-events:none;box-shadow:0 0 20px rgba(88,69,220,.15) inset}
.draw-reel-fade-l,.draw-reel-fade-r{position:absolute;top:0;bottom:0;width:120px;z-index:3;pointer-events:none}
.draw-reel-fade-l{left:0;background:linear-gradient(90deg,#0a0a16 30%,transparent)}
.draw-reel-fade-r{right:0;background:linear-gradient(-90deg,#0a0a16 30%,transparent)}
.draw-reel-strip{display:flex;align-items:center;height:100%;position:absolute;top:0;left:0;will-change:transform}
.draw-reel-item{flex-shrink:0;width:160px;height:100%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:rgba(255,255,255,.3);padding:0 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none}

/* 결과 영역 */
.draw-slot-result{padding:20px 28px 26px;text-align:center;display:none}
.draw-winner-badge{font-size:11px;font-weight:800;color:#00e5a0;letter-spacing:5px;text-transform:uppercase;opacity:0;transition:opacity .6s;margin-bottom:10px;display:block;text-shadow:0 0 14px rgba(0,229,160,.6)}
.draw-winner-badge.show{opacity:1}
.draw-winner-name{font-size:26px;font-weight:900;background:linear-gradient(135deg,#fff 0%,#c0b8ff 50%,var(--purple-l) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;display:block}
.draw-slot-info{font-size:12px;color:rgba(168,159,255,.35);margin-bottom:22px;display:block}
.draw-slot-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{background:rgba(88,69,220,.12);color:#c8c0ff;border:1px solid rgba(88,69,220,.35);border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s,box-shadow .15s}
.btn:hover{background:rgba(88,69,220,.28);box-shadow:0 0 14px rgba(88,69,220,.3)}
.btn-danger{background:rgba(220,50,50,.1);color:#ff8080;border-color:rgba(220,50,50,.3)}
.btn-danger:hover{background:rgba(220,50,50,.22);box-shadow:0 0 14px rgba(220,50,50,.3)}
</style>
</head>
<body>
<h2>🎰 슬롯 추첨 데모</h2>
<div class="top-bar">
  <div class="total-large">총 <span id="total-count">15</span>표</div>
  <div class="timer" id="timer">00:03:01</div>
</div>
<div id="vote-list"></div>
<div class="bottom-bar">
  <label class="hide-label"><input type="checkbox" id="hide-cb" onchange="render()"> 투표 내용 가리기</label>
  <button class="btn-end">투표 종료</button>
</div>

<div id="draw-overlay" onclick="if(event.target===this)closeOverlay()">
  <div class="draw-slot-box">
    <div class="draw-slot-title" id="slot-title">추첨</div>
    <div class="draw-reel-window" id="draw-reel-window">
      <div class="draw-reel-center"></div>
      <div class="draw-reel-fade-l"></div>
      <div class="draw-reel-fade-r"></div>
      <div class="draw-reel-strip" id="draw-reel-strip"></div>
    </div>
    <div class="draw-slot-result" id="draw-slot-result">
      <span class="draw-winner-badge" id="draw-winner-badge">🏆 당첨!</span>
      <span class="draw-winner-name" id="draw-winner-name"></span>
      <span class="draw-slot-info" id="draw-slot-info"></span>
      <div class="draw-slot-btns">
        <button class="btn" onclick="redrawSlot()">↺ 다시 뽑기</button>
        <button class="btn btn-danger" onclick="excludeAndClose()">⊘ 뽑힌사람 제외</button>
        <button class="btn" onclick="closeOverlay()">닫기</button>
      </div>
    </div>
  </div>
</div>

<script>
const ITEMS=[
  {label:'첫참',votes:['시청자A','시청자B','다비도팬1','구독자짱','하루카']},
  {label:'선참권',votes:['열혈시청자','첫참챔피언','선착순왕','내전고수','다비도팬2','비비주민','병아리','해스크','싹뚝잉','전설의힐러']},
];
const drawnPeople={0:new Set(),1:new Set()};
let openIdx=null,currentVoteIdx=null,lastWinner=null,animId=0;

const ITEM_W=160;
const WINNER_IDX=44;
const START_IDX=3;

function render(){
  const hidden=document.getElementById('hide-cb').checked;
  const total=ITEMS.reduce((s,it)=>s+it.votes.length,0);
  document.getElementById('total-count').textContent=total;
  document.getElementById('vote-list').innerHTML=ITEMS.map((it,i)=>{
    const pct=total>0?Math.round(it.votes.length/total*100):0;
    const isOpen=openIdx===i;
    const label=hidden?'<span style="filter:blur(5px);user-select:none;color:#fff">● ● ●</span>':it.label;
    const excl=[...drawnPeople[i]];
    const voters=it.votes.map(n=>`<span class="voter-chip">${n}</span>`).join('');
    return `<div>
      <div class="vote-item">
        <div class="vote-item-left"><div class="vote-cmd">!투표${i+1}</div><div class="vote-label">${label}</div></div>
        <div class="vote-bar-outer">
          <div class="vote-item-bar-wrap" onclick="toggleOpen(${i})">
            <div class="vote-bar-fill" style="width:${pct}%"></div>
            <span class="vote-bar-text">${it.votes.length}표&nbsp;&nbsp;${pct}%</span>
          </div>
          <button class="vote-draw-btn" onclick="openDraw(event,${i})">추첨</button>
        </div>
      </div>
      <div class="vote-voters ${isOpen?'open':''}">${voters}</div>
      ${excl.length?`<div class="draw-excluded-wrap"><span style="font-size:11px;color:#666;margin-right:4px">제외됨:</span>${excl.map(n=>`<span class="draw-excluded-chip" onclick="unexclude(${i},'${n}')">⊘ ${n}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}
function toggleOpen(i){openIdx=openIdx===i?null:i;render();}
function buildPool(i){return ITEMS[i].votes.filter(n=>!drawnPeople[i].has(n));}

function openDraw(e,i){
  e.stopPropagation();
  const pool=buildPool(i);
  if(!pool.length){alert('추첨 가능한 참가자가 없습니다');return;}
  currentVoteIdx=i;lastWinner=null;
  document.getElementById('slot-title').textContent=`🎰 ${ITEMS[i].label} 추첨`;
  document.getElementById('draw-slot-result').style.display='none';
  document.getElementById('draw-winner-badge').className='draw-winner-badge';
  document.getElementById('draw-winner-name').textContent='';
  document.getElementById('draw-slot-info').textContent='';
  document.getElementById('draw-overlay').style.display='flex';
  startSlot(pool);
}

function startSlot(pool){
  const myId=++animId;
  const winner=pool[Math.floor(Math.random()*pool.length)];

  // 릴 아이템 생성
  const TOTAL=58;
  const items=Array.from({length:TOTAL},(_,i)=>
    i===WINNER_IDX?winner:pool[Math.floor(Math.random()*pool.length)]
  );

  const winEl=document.getElementById('draw-reel-window');
  const winW=winEl.offsetWidth||620;
  const centerPos=winW/2-ITEM_W/2;
  const startX=centerPos-START_IDX*ITEM_W;
  const targetX=centerPos-WINNER_IDX*ITEM_W;

  const strip=document.getElementById('draw-reel-strip');
  strip.style.transform=`translateX(${startX}px)`;
  strip.innerHTML=items.map(n=>`<div class="draw-reel-item">${n.slice(0,10)}</div>`).join('');

  const TOTAL_MS=2500;
  let startT=null;

  function ease(t){
    if(t<0.22)return 0.10*(t/0.22)**2.5;
    if(t<0.75)return 0.10+(t-0.22)/0.53*0.78;
    const u=(t-0.75)/0.25;
    return 0.88+(1-(1-u)**3)*0.12;
  }

  function frame(now){
    if(animId!==myId)return;
    if(!startT)startT=now;
    const t=Math.min((now-startT)/TOTAL_MS,1);
    strip.style.transform=`translateX(${startX+(targetX-startX)*ease(t)}px)`;
    if(t<1){requestAnimationFrame(frame);return;}
    // 완료
    setTimeout(()=>{
      if(animId!==myId)return;
      lastWinner=winner;
      const resultEl=document.getElementById('draw-slot-result');
      resultEl.style.display='block';
      setTimeout(()=>{
        document.getElementById('draw-winner-badge').className='draw-winner-badge show';
        document.getElementById('draw-winner-name').textContent=winner;
        document.getElementById('draw-slot-info').textContent=`전체 ${pool.length}명 중 추첨`;
      },80);
    },200);
  }
  requestAnimationFrame(frame);
}

function redrawSlot(){
  const pool=buildPool(currentVoteIdx);
  if(!pool.length){alert('추첨 가능한 참가자가 없습니다');closeOverlay();return;}
  lastWinner=null;
  document.getElementById('draw-slot-result').style.display='none';
  document.getElementById('draw-winner-badge').className='draw-winner-badge';
  startSlot(pool);
}
function excludeAndClose(){if(lastWinner)drawnPeople[currentVoteIdx].add(lastWinner);closeOverlay();render();}
function closeOverlay(){animId++;document.getElementById('draw-overlay').style.display='none';}
function unexclude(i,n){drawnPeople[i].delete(n);render();}

let sec=181;
setInterval(()=>{sec++;const h=String(Math.floor(sec/3600)).padStart(2,'0'),m=String(Math.floor((sec%3600)/60)).padStart(2,'0'),s=String(sec%60).padStart(2,'0');document.getElementById('timer').textContent=`${h}:${m}:${s}`;},1000);
render();
</script>
</body>
</html>
