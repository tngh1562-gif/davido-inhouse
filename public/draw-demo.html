<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>달팽이 경주 추첨 데모</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111;--bg2:#1a1a1a;--bg3:#222;--txt:#fff;--txt2:#888;--border:#2a2a2a;--border2:#333;--acc2:#00e5a0}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:40px 32px}
h2{font-size:13px;font-weight:700;color:var(--txt2);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.total-large{font-size:32px;font-weight:900;color:#fff}
.timer{font-family:monospace;font-size:32px;font-weight:700;color:#fff}
.vote-item{display:flex;align-items:center;gap:20px;margin-bottom:14px}
.vote-item-left{width:130px;flex-shrink:0}
.vote-cmd{font-size:13px;font-weight:700;color:#fff;margin-bottom:6px}
.vote-label{font-size:28px;font-weight:900;color:#fff;line-height:1}
.vote-bar-outer{flex:1;position:relative}
.vote-item-bar-wrap{width:100%;height:56px;background:var(--bg3);border-radius:10px;overflow:hidden;cursor:pointer;display:flex;align-items:center;transition:filter .15s}
.vote-item-bar-wrap:hover{filter:brightness(1.1)}
.vote-bar-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,rgba(0,229,160,.55),rgba(0,180,255,.35));transition:width .5s ease;border-radius:10px;pointer-events:none}
.vote-bar-text{position:relative;z-index:1;padding:0 110px 0 20px;font-size:16px;font-weight:700;color:#fff;white-space:nowrap}
.vote-draw-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);z-index:3;background:#00e5a0;color:#111;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
.vote-draw-btn:hover{background:#00c880;transform:translateY(-50%) scale(1.03)}
.vote-voters{padding:8px 0 4px 150px;display:none;flex-wrap:wrap;gap:4px}
.vote-voters.open{display:flex}
.voter-chip{display:inline-flex;align-items:center;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:3px 9px;font-size:12px;color:var(--txt2)}
.draw-excluded-wrap{padding:4px 0 10px 150px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.draw-excluded-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.3);border-radius:4px;padding:3px 10px;font-size:12px;color:#ff8080;cursor:pointer}
.draw-excluded-chip:hover{background:rgba(255,80,80,.22)}
.bottom-bar{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.hide-label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt2);cursor:pointer;user-select:none}
.hide-label input{accent-color:var(--acc2);width:14px;height:14px;cursor:pointer}
.btn-end{background:#00e5a0;color:#111;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}

/* draw modal */
#draw-modal{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;display:none;align-items:center;justify-content:center}
.draw-card{background:#1c1c1e;border:1px solid #2a2a2a;border-radius:24px;padding:32px 36px;display:flex;flex-direction:column;align-items:center;width:660px;max-width:95vw;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.draw-card-title{font-size:11px;font-weight:700;color:#666;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px}

/* race track */
.race-wrap{width:100%;background:#0c1a2e;border-radius:14px;padding:10px;margin-bottom:14px;border:1px solid #1a3356}
.race-lane{position:relative;height:46px;background:linear-gradient(90deg,#091525,#0d1f38);border-radius:8px;border:1px solid #1a3356;margin-bottom:5px;overflow:visible}
.race-lane:last-child{margin-bottom:0}
.racer{position:absolute;left:2%;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;z-index:2;will-change:left}
.racer-name{font-size:9px;font-weight:700;color:#bbb;background:rgba(0,0,0,.7);border-radius:3px;padding:1px 5px;white-space:nowrap;max-width:66px;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px;line-height:1.3}
.racer-emoji{font-size:22px;line-height:1}
.racer-flag{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:18px;z-index:1}
.event-label{display:none;position:absolute;top:-22px;left:0;font-size:11px;font-weight:800;color:#fff;background:rgba(0,0,0,.8);padding:2px 7px;border-radius:5px;white-space:nowrap;z-index:4;pointer-events:none}

/* result */
.draw-winner-badge{font-size:12px;font-weight:700;color:var(--acc2);letter-spacing:4px;text-transform:uppercase;height:16px;opacity:0;transition:opacity .5s;margin-bottom:8px}
.draw-winner-badge.show{opacity:1}
.draw-winner-name{font-size:20px;font-weight:900;color:#fff;min-height:28px;text-align:center}
.draw-pool-info{font-size:12px;color:#555;margin-top:10px}
.draw-modal-btns{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;justify-content:center}
.btn{background:var(--bg3);color:#fff;border:1px solid var(--border2);border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn:hover{filter:brightness(1.2)}
.btn-danger{background:rgba(255,60,60,.15);color:#ff6060;border-color:rgba(255,60,60,.3)}
</style>
</head>
<body>
<h2>🐌 달팽이 경주 추첨 데모</h2>
<div class="top-bar">
  <div class="total-large">총 <span id="total-count">15</span>표</div>
  <div class="timer" id="timer">00:03:01</div>
</div>
<div id="vote-list"></div>
<div class="bottom-bar">
  <label class="hide-label"><input type="checkbox" id="hide-cb" onchange="render()"> 투표 내용 가리기</label>
  <button class="btn-end">투표 종료</button>
</div>

<div id="draw-modal" onclick="if(event.target===this)closeModal()">
  <div class="draw-card">
    <div class="draw-card-title" id="modal-title">🐌 달팽이 경주 추첨</div>
    <div id="race-container" style="width:100%"></div>
    <div class="draw-winner-badge" id="winner-badge">🏆 우승!</div>
    <div class="draw-winner-name" id="winner-name"></div>
    <div class="draw-pool-info" id="pool-info"></div>
    <div class="draw-modal-btns" id="modal-btns" style="display:none">
      <button class="btn" onclick="redraw()">↺ 다시 뽑기</button>
      <button class="btn btn-danger" onclick="excludeAndClose()">⊘ 뽑힌사람 제외</button>
      <button class="btn" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<script>
const ITEMS = [
  { label:'첫참', votes:['시청자A','시청자B','다비도팬1','구독자짱','하루카'] },
  { label:'선참권', votes:['열혈시청자','첫참챔피언','선착순왕','내전고수','다비도팬2','비비주민','병아리','해스크','싹뚝잉','전설의힐러'] },
];
const drawnPeople = { 0: new Set(), 1: new Set() };
let openIdx = null;
let currentVoteIdx = null;
let lastWinner = null;
let animId = 0;

// 달팽이 경주 설정
const MAX_RACERS = 8;
const TRACK_FINISH = 82; // % 도착선
const RACE_EVENTS = [
  { id:'turbo',    label:'🚀 터보 장착!',    emoji:'🐌💨', mult:4.2, dur:650  },
  { id:'legs',     label:'🦵 두발 달리기!',  emoji:'🏃💨', mult:3.0, dur:750  },
  { id:'alien',    label:'👽 외계인 납치!',   emoji:'🛸',   mult:0,   dur:650, warp:22 },
  { id:'lightning',label:'⚡ 번개 직격!',    emoji:'⚡🐌', mult:5.5, dur:280  },
  { id:'sleep',    label:'💤 갑자기 졸음...',  emoji:'😴',   mult:0,   dur:650  },
  { id:'wind',     label:'🌪️ 돌풍 직격!',    emoji:'🌪️🐌', mult:3.5, dur:480  },
  { id:'mushroom', label:'🍄 버섯 파워!',    emoji:'🐌🍄', mult:3.8, dur:520  },
  { id:'rocket',   label:'🚀 로켓 발사!',    emoji:'🚀💨', mult:7.0, dur:320  },
  { id:'magnet',   label:'🧲 자석!',          emoji:'🧲🐌', mult:2.5, dur:550  },
  { id:'banana',   label:'🍌 바나나 밟음!',   emoji:'😵',   mult:0,   dur:450  },
];

function render() {
  const hidden = document.getElementById('hide-cb').checked;
  const total = ITEMS.reduce((s,it)=>s+it.votes.length,0);
  document.getElementById('total-count').textContent = total;
  document.getElementById('vote-list').innerHTML = ITEMS.map((it,i)=>{
    const pct = total>0?Math.round(it.votes.length/total*100):0;
    const isOpen = openIdx===i;
    const label = hidden ? '<span style="filter:blur(5px);user-select:none;color:#fff">● ● ●</span>' : it.label;
    const excl = [...drawnPeople[i]];
    const voters = it.votes.map(n=>`<span class="voter-chip">${n}</span>`).join('');
    return `<div>
      <div class="vote-item">
        <div class="vote-item-left">
          <div class="vote-cmd">!투표${i+1}</div>
          <div class="vote-label">${label}</div>
        </div>
        <div class="vote-bar-outer">
          <div class="vote-item-bar-wrap" onclick="toggleOpen(${i})">
            <div class="vote-bar-fill" style="width:${pct}%"></div>
            <span class="vote-bar-text">${it.votes.length}표&nbsp;&nbsp;${pct}%</span>
          </div>
          <button class="vote-draw-btn" onclick="openDraw(event,${i})">추첨</button>
        </div>
      </div>
      <div class="vote-voters ${isOpen?'open':''}">${voters}</div>
      ${excl.length?`<div class="draw-excluded-wrap">
        <span style="font-size:11px;color:#666;margin-right:4px">제외됨:</span>
        ${excl.map(n=>`<span class="draw-excluded-chip" onclick="unexclude(${i},'${n}')">⊘ ${n}</span>`).join('')}
      </div>`:''}
    </div>`;
  }).join('');
}

function toggleOpen(i){ openIdx=openIdx===i?null:i; render(); }
function buildPool(i){ return ITEMS[i].votes.filter(n=>!drawnPeople[i].has(n)); }

function openDraw(e,i){
  e.stopPropagation();
  const pool = buildPool(i);
  if(!pool.length){ alert('추첨 가능한 참가자가 없습니다'); return; }
  currentVoteIdx=i; lastWinner=null;
  document.getElementById('modal-title').textContent = `🐌 ${ITEMS[i].label} 추첨`;
  document.getElementById('winner-badge').className='draw-winner-badge';
  document.getElementById('winner-name').textContent='';
  document.getElementById('pool-info').textContent='';
  document.getElementById('modal-btns').style.display='none';
  document.getElementById('draw-modal').style.display='flex';
  startRace(pool);
}

function startRace(pool) {
  const myId = ++animId;
  const winner = pool[Math.floor(Math.random() * pool.length)];

  const others = pool.filter(n=>n!==winner).sort(()=>Math.random()-.5).slice(0, MAX_RACERS-1);
  const racers = [winner, ...others].sort(()=>Math.random()-.5);

  const state = racers.map(name => {
    const isWinner = name === winner;
    const baseSpd = (TRACK_FINISH / (3000/1000)) * (isWinner ? 0.52 : 0.2 + Math.random()*0.25);
    return {
      name, isWinner, pos:0, baseSpd,
      eventAt: 500 + Math.random()*1300,
      event: RACE_EVENTS[Math.floor(Math.random()*RACE_EVENTS.length)],
      eventStarted:false, eventActive:false, eventEndAt:0,
      finished:false, warpDone:false,
    };
  });

  // Build DOM
  const container = document.getElementById('race-container');
  const wrap = document.createElement('div');
  wrap.className = 'race-wrap';

  state.forEach((s,i) => {
    const lane = document.createElement('div');
    lane.className = 'race-lane';
    lane.innerHTML = `
      <div class="racer-flag">🏁</div>
      <div class="racer" id="rc${i}">
        <div class="racer-name">${s.name.slice(0,8)}</div>
        <div class="racer-emoji" id="re${i}">🐌</div>
      </div>
      <div class="event-label" id="ev${i}"></div>
    `;
    wrap.appendChild(lane);
  });

  container.innerHTML = '';
  container.appendChild(wrap);

  let startT = null, lastT = null;

  function frame(now) {
    if (animId !== myId) return;
    if (!startT) { startT = now; lastT = now; }
    const elapsed = now - startT;
    const dt = Math.min((now - lastT)/1000, 0.05);
    lastT = now;

    let winnerDone = false;

    state.forEach((s, i) => {
      if (s.finished) return;

      const rcEl = document.getElementById(`rc${i}`);
      const reEl = document.getElementById(`re${i}`);
      const evEl = document.getElementById(`ev${i}`);
      if (!rcEl) return;

      // 이벤트 발동
      if (!s.eventStarted && elapsed >= s.eventAt) {
        s.eventStarted = true;
        s.eventActive = true;
        s.eventEndAt = elapsed + s.event.dur;
        if (reEl) reEl.textContent = s.event.emoji;
        if (evEl) { evEl.textContent = s.event.label; evEl.style.display = 'block'; }

        // 외계인 납치: 위로 날아갔다가 앞으로 워프
        if (s.event.id === 'alien' && !s.warpDone) {
          s.warpDone = true;
          rcEl.style.transition = 'top 0.3s';
          rcEl.style.top = '-32px';
          setTimeout(() => {
            if (animId !== myId) return;
            s.pos = Math.min(TRACK_FINISH - (s.isWinner?0:6), s.pos + s.event.warp);
            rcEl.style.top = '50%';
            rcEl.style.transition = '';
          }, s.event.dur * 0.55);
        }
      }

      // 이벤트 종료
      if (s.eventActive && elapsed >= s.eventEndAt) {
        s.eventActive = false;
        if (reEl) reEl.textContent = '🐌';
        if (evEl) evEl.style.display = 'none';
      }

      // 속도 계산
      let spd = s.baseSpd;
      if (s.eventActive && s.event.id !== 'alien') spd *= s.event.mult;
      if (s.eventActive && (s.event.id === 'alien' || s.event.id === 'sleep' || s.event.id === 'banana')) spd = 0;

      // 우승자 보정: 3초 안에 무조건 도착
      if (s.isWinner && elapsed > 400) {
        const timeLeft = Math.max(0.05, (3000 - elapsed) / 1000);
        const distLeft = TRACK_FINISH - s.pos;
        if (distLeft > 0) spd = Math.max(spd, distLeft / timeLeft * 1.15);
      }

      // 비우승자: 도착선 못 넘게
      if (!s.isWinner && s.pos > TRACK_FINISH - 8) spd *= 0.04;

      s.pos = Math.min(s.isWinner ? TRACK_FINISH : TRACK_FINISH - 3, s.pos + spd * dt);
      rcEl.style.left = s.pos + '%';

      if (s.isWinner && s.pos >= TRACK_FINISH) {
        s.finished = true;
        winnerDone = true;
        if (reEl) reEl.textContent = '🎉';
        if (evEl) { evEl.textContent = '🏆 우승!'; evEl.style.display = 'block'; evEl.style.color = '#ffd700'; }
      }
    });

    if (winnerDone) {
      setTimeout(() => {
        if (animId !== myId) return;
        lastWinner = winner;
        document.getElementById('winner-badge').className = 'draw-winner-badge show';
        document.getElementById('winner-name').textContent = `🐌 ${winner}`;
        document.getElementById('pool-info').textContent = `전체 ${pool.length}명 중 추첨`;
        document.getElementById('modal-btns').style.display = 'flex';
      }, 500);
    } else {
      requestAnimationFrame(frame);
    }
  }

  requestAnimationFrame(frame);
}

function redraw(){
  const pool = buildPool(currentVoteIdx);
  if(!pool.length){ alert('추첨 가능한 참가자가 없습니다'); closeModal(); return; }
  lastWinner=null;
  document.getElementById('winner-badge').className='draw-winner-badge';
  document.getElementById('winner-name').textContent='';
  document.getElementById('pool-info').textContent='';
  document.getElementById('modal-btns').style.display='none';
  startRace(pool);
}

function excludeAndClose(){
  if(lastWinner) drawnPeople[currentVoteIdx].add(lastWinner);
  closeModal(); render();
}
function closeModal(){ animId++; document.getElementById('draw-modal').style.display='none'; }
function unexclude(i,n){ drawnPeople[i].delete(n); render(); }

let sec=181;
setInterval(()=>{ sec++; const h=String(Math.floor(sec/3600)).padStart(2,'0'),m=String(Math.floor((sec%3600)/60)).padStart(2,'0'),s=String(sec%60).padStart(2,'0'); document.getElementById('timer').textContent=`${h}:${m}:${s}`; },1000);
render();
</script>
</body>
</html>
