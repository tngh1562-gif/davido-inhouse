<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Team Overlay</title>
<style>
  :root{
    --blue:#2f7df6;
    --blue-soft:rgba(47,125,246,.20);
    --red:#f04b55;
    --red-soft:rgba(240,75,85,.20);
    --panel:rgba(7,12,20,.90);
    --line:rgba(255,255,255,.22);
    --text:#f5f8ff;
    --muted:#aeb9cc;
    --gold:#f2c766;
  }
  *{box-sizing:border-box}
  html,body{
    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;
    background:transparent;
    font-family:"Pretendard","Noto Sans KR","Segoe UI",sans-serif;
    color:var(--text);
  }
  body{
    padding:28px;
  }
  .overlay{
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:minmax(360px,520px) 1fr minmax(360px,520px);
    align-items:center;
    gap:24px;
    transform:scale(var(--scale,1));
    transform-origin:center;
  }
  .team{
    border:1px solid var(--line);
    background:linear-gradient(180deg,rgba(18,28,45,.96),var(--panel));
    box-shadow:0 18px 48px rgba(0,0,0,.52);
    backdrop-filter:blur(10px);
    border-radius:8px;
    overflow:hidden;
  }
  .team.blue{border-color:rgba(85,154,255,.72)}
  .team.red{border-color:rgba(255,105,116,.72)}
  .head{
    height:58px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;
    border-bottom:1px solid var(--line);
    letter-spacing:0;
  }
  .blue .head{background:linear-gradient(90deg,rgba(47,125,246,.36),rgba(255,255,255,.05))}
  .red .head{background:linear-gradient(270deg,rgba(240,75,85,.36),rgba(255,255,255,.05))}
  .label{
    font-size:22px;
    font-weight:900;
    line-height:1;
  }
  .blue .label{color:#7fb0ff}
  .red .label{color:#ff8d94}
  .meta{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:var(--muted);
    font-weight:800;
  }
  .score{
    color:var(--gold);
    font-size:18px;
  }
  .list{
    display:grid;
    grid-template-rows:repeat(5,54px);
  }
  .player{
    display:grid;
    grid-template-columns:56px 1fr auto;
    align-items:center;
    gap:10px;
    padding:0 14px;
    background:rgba(2,8,18,.28);
    border-bottom:1px solid rgba(255,255,255,.16);
    min-width:0;
  }
  .player:last-child{border-bottom:0}
  .pos{
    height:28px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:4px;
    font-size:13px;
    font-weight:900;
    letter-spacing:.5px;
    background:rgba(255,255,255,.92);
    color:#0c1018;
    border:1px solid rgba(255,255,255,.95);
  }
  .blue .pos{background:#7fb0ff;color:#0a1830}
  .red .pos{background:#ff8d94;color:#330a0c}
  .name{
    min-width:0;
    font-size:18px;
    font-weight:900;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    text-shadow:0 2px 8px rgba(0,0,0,.72),0 0 14px rgba(0,0,0,.62);
  }
  .sub{
    margin-top:2px;
    color:#d5deee;
    font-size:11px;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .tier{
    max-width:92px;
    padding:5px 8px;
    border-radius:4px;
    font-size:12px;
    font-weight:900;
    color:#0c1018;
    background:#e8eef8;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .empty{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:rgba(255,255,255,.58);
    font-weight:800;
    font-size:22px;
    text-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  body.compact{padding:16px}
  body.compact .overlay{
    grid-template-columns:1fr 1fr;
    align-items:end;
  }
  body.compact .spacer{display:none}
  body.compact .team{align-self:end}
  body.compact .head{height:46px;padding:0 14px}
  body.compact .label{font-size:18px}
  body.compact .list{grid-template-rows:repeat(5,44px)}
  body.compact .player{grid-template-columns:48px 1fr auto;padding:0 10px}
  body.compact .name{font-size:15px}
  body.compact .tier{font-size:10px;max-width:76px}
  body.square{padding:10px}
  body.square .overlay{
    grid-template-columns:1fr 1fr;
    align-items:end;
    gap:8px;
  }
  body.square .spacer{display:none}
  body.square .team{align-self:end}
  body.square .head{height:34px;padding:0 8px}
  body.square .label{font-size:14px}
  body.square .meta{gap:4px;font-size:10px}
  body.square .score{font-size:13px}
  body.square .list{grid-template-rows:repeat(5,34px)}
  body.square .player{grid-template-columns:34px minmax(0,1fr) 48px;gap:5px;padding:0 6px}
  body.square .pos{height:22px;font-size:10px}
  body.square .name{font-size:11px}
  body.square .sub{font-size:8px;margin-top:1px}
  body.square .tier{font-size:8px;max-width:48px;padding:4px 5px}
  body.corner{padding:0}
  body.corner .overlay{
    position:fixed;
    right:var(--corner-margin,24px);
    bottom:var(--corner-margin,24px);
    width:var(--corner-width,var(--corner-size,620px));
    height:var(--corner-height,385px);
    grid-template-columns:1fr 1fr;
    align-items:end;
    gap:10px;
  }
  body.corner .spacer{display:none}
  body.corner .team{align-self:end}
  body.corner .head{height:34px;padding:0 10px}
  body.corner .label{font-size:13px}
  body.corner .meta{gap:4px;font-size:10px}
  body.corner .score{font-size:13px}
  body.corner .list{grid-template-rows:repeat(5,34px)}
  body.corner .player{grid-template-columns:32px minmax(0,1fr) 44px;gap:6px;padding:0 8px}
  body.corner .pos{height:21px;font-size:10px}
  body.corner .name{font-size:10.5px}
  body.corner .sub{font-size:8px;margin-top:1px}
  body.corner .tier{font-size:8px;max-width:44px;padding:4px 5px}
  @media(max-width:900px){
    body{padding:14px}
    .overlay{
      grid-template-columns:1fr 1fr;
      align-items:end;
      gap:14px;
    }
    .spacer{display:none}
    .head{height:46px}
    .label{font-size:17px}
    .list{grid-template-rows:repeat(5,42px)}
    .player{grid-template-columns:44px 1fr auto;padding:0 9px}
    .name{font-size:14px}
    .tier{font-size:10px;max-width:70px}
  }
</style>
</head>
<body>
<main class="overlay">
  <section class="team blue" id="blueTeam"></section>
  <div class="spacer"></div>
  <section class="team red" id="redTeam"></section>
</main>
<script>
const params = new URLSearchParams(location.search);
const scale = Number(params.get('scale') || '1');
if(Number.isFinite(scale) && scale > 0) document.documentElement.style.setProperty('--scale', String(scale));
const cornerSize = Number(params.get('size') || '0');
if(Number.isFinite(cornerSize) && cornerSize > 0) document.documentElement.style.setProperty('--corner-size', `${cornerSize}px`);
const cornerWidth = Number(params.get('width') || '620');
if(Number.isFinite(cornerWidth) && cornerWidth > 0) document.documentElement.style.setProperty('--corner-width', `${cornerWidth}px`);
const cornerHeight = Number(params.get('height') || '385');
if(Number.isFinite(cornerHeight) && cornerHeight > 0) document.documentElement.style.setProperty('--corner-height', `${cornerHeight}px`);
const cornerMargin = Number(params.get('margin') || '24');
if(Number.isFinite(cornerMargin) && cornerMargin >= 0) document.documentElement.style.setProperty('--corner-margin', `${cornerMargin}px`);
if(params.get('compact') === '1') document.body.classList.add('compact');
if(params.get('square') === '1') document.body.classList.add('square');
if(params.get('corner') === '1') document.body.classList.add('corner');

let teams = { blue: [], red: [], updatedAt: null };
let ws = null;

const POS_LABEL = { '탑':'TOP', '정글':'JUG', '미드':'MID', '원딜':'AD', '서포터':'SUP', '무관':'FILL' };
const POS_ORDER = { '탑':0, '정글':1, '미드':2, '원딜':3, '서포터':4, '무관':5 };
const TIER_BASE = { IR:0, BR:400, SI:800, GO:1200, PL:1600, EM:2000, DI:2400, MS:2800, GM:3800, CH:4200 };
function esc(value){
  return String(value || '').replace(/[&<>"']/g, c=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function tierScore(key){
  key = String(key || '');
  if(key === 'CH') return TIER_BASE.CH;
  if(key === 'GM') return TIER_BASE.GM;
  if(key.startsWith('MS')) return TIER_BASE.MS + (parseInt(key.slice(2),10) || 0);
  const match = key.match(/^([A-Z]{2})([1-4])$/);
  if(!match) return 0;
  return (TIER_BASE[match[1]] || 0) + (parseInt(match[2],10)-1) * 100;
}
function normalizePlayer(p){
  return {
    ...p,
    tierLabel: p.tierLabel || p.tier || '',
    score: Number(p.score) || tierScore(p.tier),
  };
}
function hasTeams(value){
  return !!((value.blue && value.blue.length) || (value.red && value.red.length));
}
function totalScore(team){
  return team.reduce((sum,p)=>sum+(Number(p.score)||0),0);
}
function posLabel(p, fallback){
  return POS_LABEL[p.assignedPos] || POS_LABEL[(p.positions||[])[0]] || fallback;
}
function tierLabel(p){
  return p.tierLabel || p.tier || '';
}
function playerPos(p){
  return p.assignedPos || (p.positions||[])[0] || '무관';
}
function sortedTeam(side){
  return [...(Array.isArray(teams[side]) ? teams[side] : [])].sort((a,b)=>{
    const ao = POS_ORDER[playerPos(a)] ?? 99;
    const bo = POS_ORDER[playerPos(b)] ?? 99;
    return ao - bo;
  });
}
function renderTeam(id, side, label){
  const team = sortedTeam(side);
  const box = document.getElementById(id);
  const score = totalScore(team);
  const rows = Array.from({ length:5 }, (_,idx)=>{
    const p = team[idx];
    if(!p){
      return `<div class="player" style="opacity:.34">
        <span class="pos">${idx+1}</span>
        <div><div class="name">빈 슬롯</div><div class="sub">대기 중</div></div>
        <span class="tier">-</span>
      </div>`;
    }
    const sub = [p.chzzk, (p.positions||[]).filter(Boolean).join(' / ')].filter(Boolean).join(' · ');
    return `<div class="player">
      <span class="pos">${esc(posLabel(p, idx+1))}</span>
      <div style="min-width:0">
        <div class="name">${esc(p.name || '?')}</div>
        <div class="sub">${esc(sub || ' ')}</div>
      </div>
      <span class="tier">${esc(tierLabel(p))}</span>
    </div>`;
  }).join('');
  box.innerHTML = `<div class="head">
    <div class="label">${label}</div>
    <div class="meta"><span class="score">${score}</span><span>PTS</span></div>
  </div><div class="list">${rows}</div>`;
}
function render(){
  const hasTeams = (teams.blue&&teams.blue.length) || (teams.red&&teams.red.length);
  if(!hasTeams){
    document.getElementById('blueTeam').innerHTML = '<div class="empty">BLUE</div>';
    document.getElementById('redTeam').innerHTML = '<div class="empty">RED</div>';
    return;
  }
  renderTeam('blueTeam', 'blue', 'BLUE');
  renderTeam('redTeam', 'red', 'RED');
}
async function fetchState(){
  try{
    const res = await fetch('/api/action', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'get_state'})
    });
    const data = await res.json();
    if(data.inhouseTeams) teams = data.inhouseTeams;
    if(!hasTeams(teams)){
      const dbRes = await fetch('/api/inhouse-db', { cache:'no-store' });
      if(dbRes.ok){
        const db = await dbRes.json();
        teams = {
          blue: Array.isArray(db.curBlue) ? db.curBlue.map(normalizePlayer) : [],
          red: Array.isArray(db.curRed) ? db.curRed.map(normalizePlayer) : [],
          updatedAt: db.updatedAt || null,
        };
      }
    }
    render();
  }catch(e){ render(); }
}
function connect(){
  try{
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}`);
    ws.onmessage = event=>{
      try{
        const msg = JSON.parse(event.data);
        if(msg.type === 'state' && msg.data && msg.data.inhouseTeams) teams = msg.data.inhouseTeams;
        if(msg.type === 'inhouse_teams_update' && msg.inhouseTeams) teams = msg.inhouseTeams;
        render();
      }catch(e){}
    };
    ws.onclose = ()=>setTimeout(connect, 1500);
  }catch(e){
    setTimeout(connect, 1500);
  }
}
fetchState();
connect();
</script>
</body>
</html>
