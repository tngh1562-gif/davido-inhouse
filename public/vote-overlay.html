<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@600;700;900&family=Rajdhani:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;font-family:'Noto Sans KR',sans-serif}
body.test-mode{background:#03050e}

#card{
  display:none;
  width:min(420px,94vw);
  padding:18px 22px 20px;
  border-radius:18px;
  background:linear-gradient(150deg,rgba(8,12,24,.92),rgba(13,20,38,.92));
  border:1px solid rgba(0,200,160,.35);
  box-shadow:0 0 0 1px rgba(255,255,255,.04),0 0 40px rgba(0,200,160,.18),0 24px 60px rgba(0,0,0,.6);
  backdrop-filter:blur(6px);
  animation:cardIn .35s cubic-bezier(.18,.9,.18,1.1) both;
}
#card.active{display:block}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

.top-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.title{font-size:14px;font-weight:700;color:rgba(226,232,240,.75);letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px}
.total-wrap{display:flex;align-items:center;gap:7px;flex-shrink:0}
.live-dot{width:8px;height:8px;border-radius:50%;background:#00e5a0;box-shadow:0 0 8px #00e5a0,0 0 18px rgba(0,229,160,.8);animation:dotPulse 1s ease-in-out infinite alternate}
@keyframes dotPulse{from{transform:scale(.7);opacity:.4}to{transform:scale(1.25);opacity:1}}
.total{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:900;color:#fff}
.total small{font-size:12px;font-weight:700;color:rgba(226,232,240,.55);margin-left:2px}

.items{display:flex;flex-direction:column;gap:10px}
.item{display:flex;align-items:center;gap:12px}
.item-cmd{
  flex-shrink:0;width:46px;text-align:center;
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:900;color:#0d1117;
  background:linear-gradient(135deg,#ffc94d,#ffb02e);
  border-radius:6px;padding:4px 0;letter-spacing:.5px;
}
.item-body{flex:1;min-width:0}
.item-label{font-size:14px;font-weight:700;color:#fff;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-label.blurred{filter:blur(6px);user-select:none}
.bar-wrap{position:relative;height:26px;border-radius:8px;background:rgba(255,255,255,.06);overflow:hidden}
.bar-fill{position:absolute;left:0;top:0;height:100%;border-radius:8px;background:linear-gradient(90deg,#00b4d8,#00e5a0);transition:width .5s ease}
.bar-text{position:absolute;inset:0;display:flex;align-items:center;padding:0 10px;font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
</style>
</head>
<body>

<div id="card">
  <div class="top-row">
    <div class="title" id="voteTitle">내전 투표</div>
    <div class="total-wrap">
      <span class="live-dot"></span>
      <span class="total" id="voteTotal">0<small>표</small></span>
    </div>
  </div>
  <div class="items" id="voteItems"></div>
</div>

<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

const card      = document.getElementById('card');
const titleEl   = document.getElementById('voteTitle');
const totalEl   = document.getElementById('voteTotal');
const itemsEl   = document.getElementById('voteItems');

let hideContent = false;

function render(vote){
  if(!vote || !Array.isArray(vote.items) || !vote.items.length){
    card.classList.remove('active');
    return;
  }
  card.classList.add('active');
  titleEl.textContent = vote.title || '내전 투표';

  const total = vote.items.reduce((s, it) => s + (it.votes ? it.votes.length : 0), 0);
  totalEl.innerHTML = `${total}<small>표</small>`;

  itemsEl.innerHTML = vote.items.map((it, i) => {
    const cnt = it.votes ? it.votes.length : 0;
    const pct = total > 0 ? Math.round(cnt / total * 100) : 0;
    const labelHtml = hideContent
      ? '<span class="item-label blurred">● ● ●</span>'
      : `<div class="item-label">${esc(it.label)}</div>`;
    return `
    <div class="item">
      <div class="item-cmd">!${i+1}</div>
      <div class="item-body">
        ${labelHtml}
        <div class="bar-wrap">
          <div class="bar-fill" style="width:${pct}%"></div>
          <div class="bar-text">${cnt}표 · ${pct}%</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function connectWS(){
  const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}`);
  ws.onmessage = e => {
    try{
      const msg = JSON.parse(e.data);
      if(msg.type === 'state' && msg.data?.vote) render(msg.data.vote);
      if(msg.type === 'vote_update') render(msg.vote);
    }catch{}
  };
  ws.onclose = () => setTimeout(connectWS, 2500);
}

const IS_TEST = new URLSearchParams(location.search).has('test');
if(IS_TEST){
  document.body.classList.add('test-mode');
  let votes1 = [], votes2 = [];
  render({
    active: true,
    title: '내전 투표 - 1세트 진행 방식',
    items: [
      { label: '첫참', votes: votes1 },
      { label: '선참권', votes: votes2 },
    ],
  });
  setInterval(() => {
    if(Math.random() > .5) votes1.push('user'+votes1.length);
    else votes2.push('user'+votes2.length);
    render({
      active: true,
      title: '내전 투표 - 1세트 진행 방식',
      items: [
        { label: '첫참', votes: votes1 },
        { label: '선참권', votes: votes2 },
      ],
    });
  }, 1200);
}else{
  connectWS();
}
</script>
</body>
</html>
