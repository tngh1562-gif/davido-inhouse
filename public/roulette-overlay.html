<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:transparent;overflow:hidden;font-family:'Noto Sans KR',sans-serif;color:#fff}
#overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:radial-gradient(circle at center,rgba(255,201,77,.16),transparent 24%),radial-gradient(circle at center,rgba(0,0,0,.38),rgba(0,0,0,.08) 56%,transparent 74%)}
#overlay.show{display:flex}
.stage{position:relative;width:min(640px,82vmin);height:min(640px,82vmin);display:grid;place-items:center;animation:popIn .28s ease-out}
.title{position:absolute;top:0;left:50%;transform:translate(-50%,-92%);font-size:clamp(22px,4vmin,42px);font-weight:900;text-shadow:0 8px 24px rgba(0,0,0,.7);white-space:nowrap}
.ticker{position:absolute;top:4%;left:50%;transform:translateX(-50%);z-index:8;width:min(470px,64vmin);height:clamp(48px,7.4vmin,68px);border-radius:14px;border:3px solid #4d9fff;background:linear-gradient(180deg,#4b1bd3 0%,#26107d 48%,#13073a 100%);box-shadow:0 0 0 5px rgba(255,201,77,.78) inset,0 0 32px rgba(77,159,255,.72),0 12px 24px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;overflow:hidden}
.ticker::before,.ticker::after{content:'✦';position:absolute;top:50%;transform:translateY(-50%);color:#ffc94d;text-shadow:0 0 14px #ffc94d;font-size:clamp(20px,3.3vmin,30px)}
.ticker::before{left:18px}.ticker::after{right:18px}
.ticker-reel{position:relative;width:70%;height:clamp(24px,4vmin,36px);overflow:visible;color:#fff44f;font-size:clamp(18px,3.1vmin,30px);font-weight:900;text-align:center;text-shadow:0 0 10px #ff2bd6,0 0 18px #ffc94d}
.ticker-reel span{display:block;height:clamp(24px,4vmin,36px);line-height:clamp(24px,4vmin,36px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wheel{position:relative;width:78%;height:78%;border-radius:50%;display:grid;place-items:center;filter:drop-shadow(0 34px 44px rgba(0,0,0,.66)) drop-shadow(0 0 30px rgba(255,201,77,.24));transition:transform 2s cubic-bezier(.08,.82,.12,1);--spin:0deg}
.wheel::before{content:'';position:absolute;inset:-24px;border-radius:50%;background:conic-gradient(from 0deg,#fff7cc,#f7b733,#8aa1bd,#ffffff,#34d399,#f7b733,#fff7cc);z-index:-3;box-shadow:0 0 44px rgba(255,201,77,.24)}
.wheel::after{content:'';position:absolute;inset:-11px;border-radius:50%;background:repeating-conic-gradient(from 0deg,#111827 0 4deg,#f8fafc 4deg 6deg,#111827 6deg 12deg);z-index:-2;box-shadow:inset 0 0 0 6px rgba(2,6,23,.9),0 0 0 1px rgba(255,255,255,.16)}
.face{position:absolute;inset:0;border-radius:50%;overflow:hidden;background:conic-gradient(from 90deg,#00c8a0 0 25%,#4d9fff 0 50%,#ffc94d 0 75%,#a78bfa 0 100%)}
.face::before{content:'';position:absolute;inset:16px;border-radius:50%;border:1px solid rgba(255,255,255,.18);box-shadow:inset 0 0 0 28px rgba(255,255,255,.025),inset 0 0 32px rgba(255,255,255,.08)}
.face::after{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at center,transparent 0 28%,rgba(0,0,0,.24) 29%,transparent 31%),radial-gradient(circle at 34% 24%,rgba(255,255,255,.38),transparent 24%),linear-gradient(135deg,rgba(255,255,255,.3),transparent 30%,rgba(0,0,0,.3) 76%,rgba(255,255,255,.14));box-shadow:inset 0 0 0 4px rgba(255,255,255,.24),inset 0 0 56px rgba(0,0,0,.46)}
.labels{position:absolute;inset:0;border-radius:50%;pointer-events:none}
.label{position:absolute;width:170px;text-align:center;font-size:clamp(13px,2vmin,19px);font-weight:900;line-height:1.12;text-shadow:0 3px 4px rgba(0,0,0,.95),0 0 12px rgba(0,0,0,.78);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transform:translate(-50%,-50%) rotate(calc(-1 * var(--spin)))}
.pointer{position:absolute;right:7.5%;top:50%;transform:translateY(-50%);z-index:6;width:76px;height:58px;background:linear-gradient(90deg,#f59e0b 0%,#fff7cc 58%,#ffffff 100%);clip-path:polygon(0 50%,100% 0,100% 100%);filter:drop-shadow(0 7px 12px rgba(0,0,0,.6)) drop-shadow(0 0 16px rgba(255,201,77,.38))}
.result{position:absolute;bottom:0;left:50%;transform:translate(-50%,82%);min-width:min(560px,86vw);padding:20px 28px;border-radius:14px;background:rgba(8,13,22,.88);border:1px solid rgba(255,255,255,.16);box-shadow:0 20px 48px rgba(0,0,0,.55);text-align:center;opacity:0;transition:opacity .25s,transform .25s}
.result.show{opacity:1;transform:translate(-50%,74%)}
.result .nick{font-size:clamp(15px,2.2vmin,22px);font-weight:800;color:#94a3b8}
.result .prize{margin-top:4px;font-size:clamp(30px,5.6vmin,56px);font-weight:900;color:#ffc94d;line-height:1.05;text-shadow:0 0 28px rgba(255,201,77,.35)}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="overlay">
  <div class="stage">
    <div class="title" id="title">1500치즈 룰렛</div>
    <div class="ticker"><div id="tickerReel" class="ticker-reel"><span>READY</span></div></div>
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
      <div class="face" id="face"></div>
      <div class="labels" id="labels"></div>
    </div>
    <div class="result" id="result">
      <div class="nick" id="nick"></div>
      <div class="prize" id="prize"></div>
    </div>
  </div>
</div>
<script>
let cfg={items:[],overlayTitle:'1500치즈 룰렛'};
let spinDeg=0;
const overlay=document.getElementById('overlay');
const wheel=document.getElementById('wheel');
const face=document.getElementById('face');
const labels=document.getElementById('labels');
const title=document.getElementById('title');
const tickerReel=document.getElementById('tickerReel');
const resultBox=document.getElementById('result');
const nickEl=document.getElementById('nick');
const prizeEl=document.getElementById('prize');
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
async function loadConfig(){
  try{cfg=await (await fetch('/api/roulette-config',{cache:'no-store'})).json();renderWheel()}
  catch{}
}
function renderWheel(){
  title.textContent=cfg.overlayTitle||'1500치즈 룰렛';
  const items=(cfg.items||[]).filter(item=>item.enabled!==false&&item.label);
  if(!items.length){face.style.background='conic-gradient(from 90deg,#334155 0 100%)';labels.innerHTML='';return}
  const total=items.reduce((sum,item)=>sum+(Number(item.weight)||1),0);
  let pct=0;
  const nodes=[];
  const stops=items.map((item,i)=>{
    const start=pct;
    pct+=((Number(item.weight)||1)/total)*100;
    const mid=((start+pct)/2)*3.6;
    const labelDeg=mid;
    const label=String(item.label||'').length>12?String(item.label).slice(0,12)+'...':item.label;
    const rad=labelDeg*Math.PI/180;
    const wheelSize=wheel.clientWidth||420;
    const radius=Math.max(116,Math.min(wheelSize*0.29,168));
    const center=wheelSize/2;
    const x=center+Math.cos(rad)*radius;
    const y=center+Math.sin(rad)*radius;
    nodes.push(`<div class="label" style="left:${x.toFixed(1)}px;top:${y.toFixed(1)}px">${esc(label)}</div>`);
    return `${item.color||'#00c8a0'} ${start.toFixed(2)}% ${pct.toFixed(2)}%`;
  });
  face.style.background=`conic-gradient(from 90deg,${stops.join(',')})`;
  labels.innerHTML=nodes.join('');
  updateTicker(items[0]?.label||'READY');
}
let tickerTimer=null;
function updateTicker(text){
  if(!tickerReel) return;
  const nextText=text||'READY';
  const current=tickerReel.querySelector('span:last-child')?.textContent||'';
  if(!current||current===nextText){
    tickerReel.style.transition='none';
    tickerReel.style.transform='translateY(0)';
    tickerReel.innerHTML=`<span>${esc(nextText)}</span>`;
    return;
  }
  tickerReel.style.transition='none';
  tickerReel.style.transform='translateY(0)';
  tickerReel.innerHTML=`<span>${esc(current)}</span><span>${esc(nextText)}</span>`;
  requestAnimationFrame(()=>{
    const lineHeight=tickerReel.querySelector('span')?.offsetHeight||32;
    tickerReel.style.transition='transform .22s cubic-bezier(.2,.78,.22,1)';
    tickerReel.style.transform=`translateY(-${lineHeight}px)`;
  });
  setTimeout(()=>{
    tickerReel.style.transition='none';
    tickerReel.style.transform='translateY(0)';
    tickerReel.innerHTML=`<span>${esc(nextText)}</span>`;
  },240);
}
function animateTicker(finalText){
  clearInterval(tickerTimer);
  const pool=(cfg.items||[]).filter(item=>item.enabled!==false&&item.label);
  if(!pool.length){updateTicker(finalText||'READY');return}
  let i=0;
  tickerTimer=setInterval(()=>{
    updateTicker(pool[i%pool.length].label);
    i++;
  },120);
  setTimeout(()=>{
    clearInterval(tickerTimer);
    updateTicker(finalText||'');
  },2050);
}
function showResult(entry){
  renderWheel();
  overlay.classList.add('show');
  resultBox.classList.remove('show');
  animateTicker(entry.result);
  nickEl.textContent=`${entry.nickname||'시청자'} · ${Number(entry.amount)||0}치즈`;
  prizeEl.textContent=entry.result||'';
  spinDeg+=1080+Math.floor(Math.random()*360);
  wheel.style.transform=`rotate(${spinDeg}deg)`;
  wheel.style.setProperty('--spin',`${spinDeg}deg`);
  setTimeout(()=>resultBox.classList.add('show'),2050);
  clearTimeout(showResult.timer);
  showResult.timer=setTimeout(()=>overlay.classList.remove('show'),7200);
}
function connectWS(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  const ws=new WebSocket(`${proto}//${location.host}`);
  ws.onmessage=e=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='state'&&msg.data?.rouletteAdmin) cfg=msg.data.rouletteAdmin;
    if(msg.type==='roulette_admin_result'){
      if(msg.config) cfg=msg.config;
      showResult(msg.result||{});
    }
  };
  ws.onclose=()=>setTimeout(connectWS,2500);
}
loadConfig();
connectWS();
addEventListener('resize',renderWheel);
</script>
</body>
</html>
