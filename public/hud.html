<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>LoL HUD</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:940px;
  height:136px;
  overflow:hidden;
  background:transparent;
  font-family:"Rajdhani","Arial",sans-serif;
}

#hud{
  position:relative;
  width:940px;
  height:136px;
  color:#eef5ff;
  isolation:isolate;
}

.backplate{
  position:absolute;
  left:18px;
  right:18px;
  top:14px;
  height:108px;
  background:
    linear-gradient(90deg,rgba(20,83,190,.28),rgba(7,11,24,.96) 27%,rgba(7,11,24,.98) 73%,rgba(195,32,25,.28)),
    linear-gradient(180deg,rgba(19,28,52,.98),rgba(4,7,17,.98));
  clip-path:polygon(0 26px,22px 0,48% 0,50% 12px,52% 0,calc(100% - 22px) 0,100% 26px,100% calc(100% - 16px),calc(100% - 16px) 100%,52% 100%,50% calc(100% - 12px),48% 100%,16px 100%,0 calc(100% - 16px));
  border-top:1px solid rgba(255,255,255,.18);
  border-bottom:1px solid rgba(255,255,255,.14);
  box-shadow:
    inset 0 0 32px rgba(0,0,0,.78),
    0 10px 34px rgba(0,0,0,.42);
}
.backplate::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(90deg,transparent 0 19px,rgba(255,255,255,.035) 20px,transparent 21px),
    linear-gradient(transparent 0 19px,rgba(255,255,255,.025) 20px,transparent 21px);
  background-size:40px 40px;
  opacity:.55;
}
.backplate::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  top:0;
  height:3px;
  background:linear-gradient(90deg,#246cff,#58c0ff 22%,transparent 43%,transparent 57%,#ff694f 78%,#ff1e1e);
  box-shadow:0 0 18px rgba(72,152,255,.6),0 0 18px rgba(255,60,42,.48);
}

.side{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:318px;
  height:64px;
  z-index:2;
  display:grid;
  grid-template-columns:88px repeat(2,1fr);
  gap:7px;
  align-items:stretch;
}
.side.blue{left:36px}
.side.red{
  right:36px;
  grid-template-columns:repeat(2,1fr) 88px;
}

.team-tag{
  position:relative;
  height:100%;
  display:flex;
  flex-wrap:wrap;
  align-content:center;
  gap:3px;
  overflow:hidden;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.14);
}
.blue .team-tag{
  padding:4px 16px 4px 6px;
  clip-path:polygon(0 0,100% 0,84% 100%,0 100%);
  border-left:3px solid #4da7ff;
  box-shadow:inset 18px 0 26px rgba(46,126,255,.20),0 0 22px rgba(52,126,255,.12);
}
.red .team-tag{
  order:4;
  padding:4px 6px 4px 16px;
  clip-path:polygon(16% 0,100% 0,100% 100%,0 100%);
  border-right:3px solid #ff5645;
  box-shadow:inset -18px 0 26px rgba(255,70,46,.18),0 0 22px rgba(255,55,38,.10);
}

.stat{
  position:relative;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  overflow:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.025));
  border:1px solid rgba(255,255,255,.13);
  box-shadow:inset 0 0 18px rgba(0,0,0,.45);
}
.blue .stat{clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%)}
.red .stat{clip-path:polygon(0 0,calc(100% - 10px) 0,100% 100%,10px 100%)}
.stat::before{
  content:"";
  position:absolute;
  inset:0;
  opacity:.16;
}
.blue .stat::before{background:linear-gradient(100deg,#3898ff,transparent 70%)}
.red .stat::before{background:linear-gradient(260deg,#ff4f3b,transparent 70%)}
.icon{
  position:relative;
  width:28px;
  height:28px;
  display:grid;
  place-items:center;
  flex-shrink:0;
}
.value{
  position:relative;
  min-width:36px;
  font-size:28px;
  font-weight:900;
  line-height:1;
  letter-spacing:0;
  text-align:center;
  white-space:nowrap;
}
.label{display:none}
.blue .stat.kill .value{color:#55b5ff;text-shadow:0 0 19px rgba(71,158,255,.78)}
.red .stat.kill .value{color:#ff6a59;text-shadow:0 0 19px rgba(255,82,58,.74)}
.stat.gold{
  gap:5px;
}
.stat.gold .value{
  min-width:0;
  font-size:22px;
}
.icon img{
  display:block;
  object-fit:contain;
  opacity:.82;
}

.core{
  position:absolute;
  left:50%;
  top:2px;
  z-index:4;
  width:256px;
  height:132px;
  transform:translateX(-50%);
  display:grid;
  place-items:center;
}
.core-shell{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 50% 46%,rgba(64,81,130,.86),rgba(8,12,27,.98) 56%,transparent 57%),
    rgba(8,12,27,.82);
  clip-path:polygon(50% 0,66% 20%,100% 34%,80% 50%,100% 66%,66% 80%,50% 100%,34% 80%,0 66%,20% 50%,0 34%,34% 20%);
}
.core-shell::before{
  content:"";
  position:absolute;
  inset:17px 38px;
  border:1px solid rgba(218,230,255,.25);
  clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);
  background:rgba(3,6,17,.56);
}
.score-row{
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:2px;
  transform:translateY(-3px);
}
.ks-b,.ks-r{
  font-size:52px;
  font-weight:900;
  line-height:.85;
  letter-spacing:0;
}
.ks-b{color:#4aaaff;text-shadow:0 0 24px rgba(63,150,255,.9)}
.ks-r{color:#ff5847;text-shadow:0 0 24px rgba(255,75,50,.86)}
.slash{
  width:16px;
  height:46px;
  position:relative;
  flex-shrink:0;
}
.slash::before,.slash::after{
  content:"";
  position:absolute;
  left:8px;
  width:3px;
  height:21px;
  background:rgba(229,239,255,.30);
  transform:skewX(-16deg);
}
.slash::before{top:0}
.slash::after{bottom:0}
.timer-row{
  position:absolute;
  z-index:3;
  left:0;
  right:0;
  bottom:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:9px;
}
.timer-row::before,.timer-row::after{
  content:"";
  width:28px;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(220,232,255,.28),transparent);
}
.timer{
  font-size:12px;
  font-weight:800;
  letter-spacing:5px;
  color:rgba(207,222,252,.54);
}

#deco{
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;
}

#waiting{
  position:absolute;
  inset:14px 15px 18px;
  z-index:20;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:rgba(4,7,16,.94);
  color:rgba(222,233,255,.24);
  font-size:11px;
  font-weight:900;
  letter-spacing:8px;
  text-transform:uppercase;
  opacity:0;
  pointer-events:none;
  transition:opacity .55s;
  clip-path:polygon(0 26px,22px 0,calc(100% - 22px) 0,100% 26px,100% calc(100% - 16px),calc(100% - 16px) 100%,16px 100%,0 calc(100% - 16px));
}
.dot{animation:blink 1.6s ease infinite}
.dot:nth-child(2){animation-delay:.25s}
.dot:nth-child(3){animation-delay:.5s}
@keyframes blink{0%,80%,100%{opacity:.1}40%{opacity:.7}}

/* ── 바론 버프 네온 ── */
.baron-ov{
  position:absolute;
  top:14px;height:3px;
  width:44%;
  pointer-events:none;
  z-index:8;
  opacity:0;
  transition:opacity .4s;
}
#baron-ov-blue{
  left:18px;
  background:linear-gradient(90deg,#8822ee,#bb66ff 50%,transparent);
  box-shadow:0 0 20px rgba(130,30,240,.9);
}
#baron-ov-red{
  right:18px;
  background:linear-gradient(270deg,#cc00ff,#aa44ff 50%,transparent);
  box-shadow:0 0 20px rgba(180,0,255,.9);
}
.baron-ov.active{opacity:1}
@keyframes baronBlink{0%,49%{opacity:1}50%,100%{opacity:.08}}
.baron-ov.blink{animation:baronBlink .7s step-end infinite}
#hud.baron-blue .blue .team-tag{
  border-left-color:#9933ff;
  box-shadow:inset 18px 0 26px rgba(110,30,220,.28),0 0 22px rgba(130,40,255,.22);
}
#hud.baron-red .red .team-tag{
  border-right-color:#cc00ff;
  box-shadow:inset -18px 0 26px rgba(160,0,255,.25),0 0 22px rgba(180,0,255,.18);
}
@keyframes tagBlink{0%,49%{opacity:1}50%,100%{opacity:.15}}
#hud.baron-blue-blink .blue .team-tag{animation:tagBlink .7s step-end infinite}
#hud.baron-red-blink .red .team-tag{animation:tagBlink .7s step-end infinite}

@keyframes killFlash{
  0%{transform:scale(1.35);filter:brightness(2.25)}
  100%{transform:scale(1);filter:brightness(1)}
}
.kill-flash{animation:killFlash .42s cubic-bezier(.16,1,.3,1) forwards}

.obj-icon{
  width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
@keyframes objIn{0%{opacity:0;transform:scale(.6)}100%{opacity:1;transform:scale(1)}}
.obj-icon{animation:objIn .3s cubic-bezier(.16,1,.3,1) forwards}
</style>
</head>
<body>
<div id="hud">
  <div class="backplate"></div>

  <section class="side blue">
    <div class="team-tag" id="bobj">
      <div class="obj-icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/scoreboard/_infernaldrake.png" width="17" height="17" style="object-fit:contain"/></div>
      <div class="obj-icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/scoreboard/_clouddrake.png" width="17" height="17" style="object-fit:contain"/></div>
      <div class="obj-icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/scoreboard/_mountaindrake.png" width="17" height="17" style="object-fit:contain"/></div>
      <div class="obj-icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/scoreboard/_oceandrake.png" width="17" height="17" style="object-fit:contain"/></div>
      <div class="obj-icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/scoreboard/_hextechdrake.png" width="17" height="17" style="object-fit:contain"/></div>
    </div>
    <div class="stat">
      <i class="icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/minimap/icons/tower.png" width="26" height="26"/></i>
      <span class="value" id="bt">3</span>
      <span class="label">타워</span>
    </div>
    <div class="stat gold">
      <i class="icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/floatingtext/goldicon.png" width="26" height="26"/></i>
      <span class="value" id="bg">37.4K</span>
      <span class="label">골드</span>
    </div>
  </section>

  <div class="core">
    <div class="core-shell"></div>
    <div class="score-row">
      <span class="ks-b" id="bsc">20</span>
      <span class="slash"></span>
      <span class="ks-r" id="rsc">15</span>
    </div>
    <div class="timer-row"><span class="timer" id="tmr">21:19</span></div>
  </div>

  <section class="side red">
    <div class="stat gold">
      <i class="icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/floatingtext/goldicon.png" width="26" height="26"/></i>
      <span class="value" id="rg">42.3K</span>
      <span class="label">골드</span>
    </div>
    <div class="stat">
      <i class="icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/minimap/icons/tower.png" width="26" height="26"/></i>
      <span class="value" id="rt">0</span>
      <span class="label">타워</span>
    </div>
    <div class="team-tag" id="robj">
      <div class="obj-icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/scoreboard/_chemtechdrake.png" width="17" height="17" style="object-fit:contain"/></div>
      <div class="obj-icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/scoreboard/_baronnashor.png" width="17" height="17" style="object-fit:contain"/></div>
      <div class="obj-icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/minimap/icons/grub.png" width="17" height="17" style="object-fit:contain"/></div>
      <div class="obj-icon"><img src="https://raw.communitydragon.org/latest/game/assets/ux/scoreboard/_riftherald.png" width="17" height="17" style="object-fit:contain"/></div>
    </div>
  </section>

  <svg id="deco" width="940" height="136" viewBox="0 0 940 136" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke-linecap="round">
      <path d="M36 22h130M36 22v24M904 22h-130M904 22v24" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
      <path d="M36 114h130M36 114V90M904 114h-130M904 114V90" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
      <path d="M36 22h100M36 114h100" stroke="rgba(73,151,255,.48)" stroke-width="1.2"/>
      <path d="M904 22h-100M904 114h-100" stroke="rgba(255,73,51,.48)" stroke-width="1.2"/>
      <path d="M360 38 422 66 360 94M580 38 518 66 580 94" stroke="rgba(220,232,255,.11)" stroke-width="1"/>
      <path d="M382 47 422 66 382 85" stroke="rgba(80,155,255,.30)" stroke-width="1"/>
      <path d="M558 47 518 66 558 85" stroke="rgba(255,84,62,.30)" stroke-width="1"/>
    </g>
    <g fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.22)" stroke-width=".7">
      <polygon points="470,14 476,20 470,26 464,20"/>
      <polygon points="470,118 476,112 470,106 464,112"/>
    </g>
  </svg>


  <div id="baron-ov-blue" class="baron-ov"></div>
  <div id="baron-ov-red" class="baron-ov"></div>

  <div id="waiting" style="display:none">
    게임 대기중
    <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>
</div>

<script>
const API='http://127.0.0.1:2999/liveclientdata/allgamedata';
const W=document.getElementById('waiting');
let prevBK=-1,prevRK=-1;
const BARON_DUR=180;
const baronKill={blue:-1,red:-1};
const ovBlue=document.getElementById('baron-ov-blue');
const ovRed=document.getElementById('baron-ov-red');
const HUD=document.getElementById('hud');

function applyBaronFx(gameTime){
  for(const[team,ov] of [['blue',ovBlue],['red',ovRed]]){
    const rem=baronKill[team]>=0?(baronKill[team]+BARON_DUR)-gameTime:0;
    if(rem>10){
      ov.className='baron-ov active';
      HUD.classList.add(`baron-${team}`);HUD.classList.remove(`baron-${team}-blink`);
    }else if(rem>0){
      ov.className='baron-ov active blink';
      HUD.classList.add(`baron-${team}`,`baron-${team}-blink`);
    }else{
      ov.className='baron-ov';
      HUD.classList.remove(`baron-${team}`,`baron-${team}-blink`);
    }
  }
}

const SB='https://raw.communitydragon.org/latest/game/assets/ux/scoreboard';
const ANN='https://raw.communitydragon.org/latest/game/assets/ux/announcements';
const OBJ={
  dragon:{
    Air:     {c:'#9dd0d4', img:`${SB}/_clouddrake.png`},
    Fire:    {c:'#ff8c40', img:`${SB}/_infernaldrake.png`},
    Earth:   {c:'#c09060', img:`${SB}/_mountaindrake.png`},
    Water:   {c:'#4d90d8', img:`${SB}/_oceandrake.png`},
    Hextech: {c:'#a566ff', img:`${SB}/_hextechdrake.png`},
    Chemtech:{c:'#54b848', img:`${SB}/_chemtechdrake.png`},
    Elder:   {c:'#ffd93d', img:`${SB}/_elderdrake.png`},
  },
  baron:  {c:'#c060ff', img:`${SB}/_baronnashor.png`},
  herald: {c:'#9070e0', img:`${SB}/_riftherald.png`},
  grub:   {c:'#8855ff', img:'https://raw.communitydragon.org/latest/game/assets/ux/minimap/icons/grub.png'},
};

function mkIcon(imgUrl){
  return `<div class="obj-icon"><img src="${imgUrl}" width="17" height="17" style="object-fit:contain;display:block" onerror="this.style.display='none'"/></div>`;
}

function renderObjs(events,players){
  const bo=[],ro=[];
  for(const ev of events){
    const killer=players.find(p=>p.summonerName===ev.KillerName||p.riotIdGameName===ev.KillerName);
    const arr=killer?.team==='ORDER'?bo:ro;
    if(ev.EventName==='DragonKill'){
      const d=OBJ.dragon[ev.DragonType]||OBJ.dragon.Fire;
      arr.push(mkIcon(d.img));
    }else if(ev.EventName==='BaronKill'){
      arr.push(mkIcon(OBJ.baron.img));
    }else if(ev.EventName==='HeraldKill'){
      arr.push(mkIcon(OBJ.herald.img));
    }else if(ev.EventName==='VoidGrubKill'){
      arr.push(mkIcon(OBJ.grub.img));
    }
  }
  document.getElementById('bobj').innerHTML=bo.join('');
  document.getElementById('robj').innerHTML=ro.join('');
}

function fmtTime(s){const m=Math.floor(s/60);return`${String(m).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;}
function fmtGold(g){return g>=1000?(g/1000).toFixed(1)+'K':Math.round(g);}
function set(id,v){const el=document.getElementById(id);if(el&&el.textContent!==String(v))el.textContent=v;}
function flash(id){const el=document.getElementById(id);if(!el)return;el.classList.remove('kill-flash');void el.offsetWidth;el.classList.add('kill-flash');}

async function poll(){
  try{
    const res=await fetch(API,{cache:'no-store'});
    if(!res.ok)throw 0;
    const d=await res.json();
    W.style.opacity='0';W.style.pointerEvents='none';
    set('tmr',fmtTime(d.gameData.gameTime));
    let bk=0,rk=0;
    for(const p of d.allPlayers){p.team==='ORDER'?bk+=p.scores.kills:rk+=p.scores.kills;}
    if(prevBK!==-1&&bk!==prevBK){flash('bk');flash('bsc');}
    if(prevRK!==-1&&rk!==prevRK){flash('rk');flash('rsc');}
    prevBK=bk;prevRK=rk;
    set('bk',bk);set('bsc',bk);set('rk',rk);set('rsc',rk);
    let bt=0,rt=0;
    for(const ev of (d.events?.Events||[])){
      if(ev.EventName==='TurretKilled'){const n=ev.TurretKilled||'';if(n.includes('T1_'))rt++;else if(n.includes('T2_'))bt++;}
    }
    set('bt',bt);set('rt',rt);
    let bg=0,rg=0;
    for(const p of d.allPlayers){
      const g=500+(p.scores.creepScore*19.8)+(p.scores.kills*300)+(p.scores.assists*150);
      p.team==='ORDER'?bg+=g:rg+=g;
    }
    set('bg',fmtGold(bg));set('rg',fmtGold(rg));
    const evs=d.events?.Events||[];
    for(const ev of evs){
      if(ev.EventName==='BaronKill'){
        const killer=d.allPlayers.find(p=>p.summonerName===ev.KillerName||p.riotIdGameName===ev.KillerName);
        const team=killer?.team==='ORDER'?'blue':'red';
        if(ev.EventTime>baronKill[team])baronKill[team]=ev.EventTime;
      }
    }
    applyBaronFx(d.gameData.gameTime);
    renderObjs(evs, d.allPlayers);
  }catch{
    W.style.opacity='1';W.style.pointerEvents='auto';
  }
}
poll();
setInterval(poll,2000);
</script>
</body>
</html>
